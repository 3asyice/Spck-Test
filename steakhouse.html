<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NC Steakhouse</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c8a96a;
      --card: #1a1a1a;
      --accent: #8b0000;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #0b0b0b, #1a1a1a);
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--gold);
    }

    .menu-btn {
      font-size: 26px;
      cursor: pointer;
    }

    .menu {
      position: absolute;
      top: 80px;
      right: 40px;
      background: var(--card);
      border-radius: 12px;
      display: none;
      flex-direction: column;
      padding: 10px;
      width: 230px;
    }

    .menu button {
      background: none;
      border: none;
      color: white;
      padding: 12px;
      text-align: left;
      cursor: pointer;
    }

    .container {
      text-align: center;
      margin-top: 120px;
      padding: 20px;
    }

    .login-box {
      display: none;
      background: var(--card);
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      margin: 20px auto;
    }

    .playlists {
      display: none;
      margin-top: 40px;
    }

    .playlist-btn {
      display: block;
      margin: 12px auto;
      padding: 14px;
      width: 300px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, var(--accent), #b22222);
      color: white;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      background: #111;
      color: white;
    }

    .btn {
      background: var(--gold);
      border: none;
      padding: 12px;
      width: 100%;
      color: black;
      cursor: pointer;
      border-radius: 6px;
    }

    .div-bem-vindo {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .div-bem-vindo p {
      background: var(--accent);
      padding: 10px;
      border-radius: 8px;
      display: inline-block;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">NC Steakhouse</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="menu" id="menu">
  <button onclick="openLogin('gerente')">Entrar como Gerente</button>
  <button onclick="openLogin('garcom')">Entrar como Garçom</button>
  <button onclick="showPlaylists()">Playlists</button>
</div>

<div class="container">
  <h1 id="greeting"></h1>

  <div class="login-box" id="loginBox">
    <h3 id="loginTitle"></h3>
    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">
    <button class="btn" onclick="login()">Entrar</button>
  </div>

  <div class="playlists" id="playlistBox">
    <h2>Playlists NC Steakhouse</h2>

    <button class="playlist-btn" onclick="openPlaylist('https://archive.org/embed/0-stkhs-playlist-a')">
      Steakhouse Classics Pt 1
    </button>

    <button class="playlist-btn" onclick="openPlaylist('https://archive.org/details/0-skhs-bc')">
      Steakhouse Classics Pt 2
    </button>
  </div>

</div>
<div id="playerContainer" style="display:none; margin-top:20px;">
  <iframe 
    id="playlistFrame"
    width="100%" 
    height="400" 
    style="border-radius:10px; border:none;">
  </iframe>
</div>
<script>
let currentRole = '';

function toggleMenu() {
  const menu = document.getElementById('menu');
  menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
}

function openLogin(role) {
  currentRole = role;
  document.getElementById('loginBox').style.display = 'block';
  document.getElementById('playlistBox').style.display = 'none';

  if (role === 'gerente') {
    document.getElementById('loginTitle').innerText = 'Gerente - Jonas';
  } else {
    document.getElementById('loginTitle').innerText = 'Garçom - Théo';
  }
}

function showPlaylists() {
  document.getElementById('playlistBox').style.display = 'block';
  document.getElementById('loginBox').style.display = 'none';
}

function login() {
  const user = document.getElementById('user').value;
  const pass = document.getElementById('pass').value;
  const menu = document.getElementById('menu');
  const bemVindo = document.getElementById('div-bem-vindo');

  if (user === 'admin' && pass === 'admin') {
    showPlaylists();
    menu.style.display = 'none';

    if (currentRole === 'gerente') {
      bemVindo.style.display = 'block';
    }

    setGreeting();
  } else {
    alert('Login inválido!');
  }
}

function openPlaylist(url) {
  const iframe = document.getElementById('playlistFrame');
  const container = document.getElementById('playerContainer');
  
  iframe.src = url;
  container.style.display = 'block';
  
  // rolar suavemente até o player
  container.scrollIntoView({ behavior: 'smooth' });
}

function setGreeting() {
  const hour = new Date().getHours();
  let nome = '';

  if (currentRole === 'gerente') nome = 'Jonas';
  else if (currentRole === 'garcom') nome = 'Théo';

  let greeting = '';

  if (hour >= 5 && hour < 12) {
    greeting = 'Bom dia';
  } else if (hour >= 12 && hour < 18) {
    greeting = 'Boa tarde';
  } else {
    greeting = 'Boa noite';
  }

  document.getElementById('greeting').innerText =
    nome ? `${greeting} ${nome}!` : `${greeting}!`;
}

setGreeting();
</script>

</body>
</html>
