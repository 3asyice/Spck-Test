<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>O Clube</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    color:#fff;
    overflow:hidden;
    font-family:'IBM Plex Mono',monospace;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#screen{

    width:min(850px,90%);
    opacity:0;
    transition:opacity 1s;

}

#screen.show{
    opacity:1;
}

.center{
    text-align:center;
}

h1{

    font-size:40px;
    font-weight:400;
    letter-spacing:10px;
    margin-bottom:60px;

}

.line{

    height:1px;
    background:#fff;
    margin:25px 0;

}

p{

    font-size:18px;
    line-height:1.9;
    margin:15px 0;

}

button{

    margin-top:70px;

    background:transparent;

    color:#fff;

    border:1px solid #fff;

    padding:16px 42px;

    cursor:pointer;

    font-family:inherit;

    font-size:16px;

    transition:.4s;

}

button:hover{

    background:#fff;

    color:#000;

}

input,textarea{

    width:100%;

    background:transparent;

    border:none;

    border-bottom:1px solid white;

    color:white;

    font-size:22px;

    padding:15px 5px;

    margin-top:35px;

    outline:none;

    font-family:inherit;

}

textarea{

    resize:none;

    height:120px;

}

.options{

    margin-top:40px;

}

.option{

    display:block;

    margin:20px 0;

    cursor:pointer;

    font-size:19px;

}

.fade{

    animation:fade 1s;

}

@keyframes fade{

    from{

        opacity:0;

    }

    to{

        opacity:1;

    }

}

.cursor{

    animation:blink .8s infinite;

}

@keyframes blink{

    50%{

        opacity:0;

    }

}

.loading{

    text-align:center;

    font-size:20px;

    letter-spacing:2px;

}

.progress{

    width:100%;

    height:2px;

    background:#222;

    margin-top:35px;

}

.bar{

    width:0%;

    height:100%;

    background:#fff;

}

.crt:before{

content:"";

position:fixed;

top:0;

left:0;

right:0;

bottom:0;

pointer-events:none;

background:
linear-gradient(
rgba(255,255,255,.02) 50%,
transparent 50%
);

background-size:100% 4px;

opacity:.18;

}

.crt:after{

content:"";

position:fixed;

top:0;

left:0;

right:0;

bottom:0;

pointer-events:none;

background:rgba(255,255,255,.015);

animation:flicker .15s infinite;

}

@keyframes flicker{

0%{opacity:.03;}

50%{opacity:.05;}

100%{opacity:.03;}

}

.hidden{

display:none;

}

</style>

</head>

<body class="crt">

<div id="screen"></div>
